name: Hermes BEAM CI

on:
  push:
    branches: [main]
    paths:
      - 'hermes_beam/**'
      - 'babashka_workers/**'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'hermes_beam/**'
      - 'babashka_workers/**'
      - '.github/workflows/tests.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hermes-beam-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  hermes-beam:
    name: Gleam format, build, test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: hermes_beam
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Erlang, Rebar3, and Gleam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          rebar3-version: '3'
          gleam-version: '1.6.3'

      - name: Check Gleam formatting
        run: gleam format --check src test

      - name: Download Gleam dependencies
        run: gleam deps download

      - name: Build Hermes BEAM
        run: gleam build

      - name: Test Hermes BEAM
        run: gleam test

  babashka-workers:
    name: Optional Babashka worker tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Babashka worker tests when available
        if: hashFiles('babashka_workers/bb.edn', 'babashka_workers/test/**/*.clj') != ''
        working-directory: babashka_workers
        run: |
          set -euo pipefail
          if ! command -v bb >/dev/null 2>&1; then
            echo "Babashka is not installed on this runner; skipping."
          elif bb tasks | grep -Eq '(^|[[:space:]])(ci:test|test)([[:space:]]|$)'; then
            if bb tasks | grep -Eq '(^|[[:space:]])ci:test([[:space:]]|$)'; then
              bb ci:test
            else
              bb test
            fi
          else
            echo "Babashka is present, but no test or ci:test task is defined; skipping."
          fi

      - name: Skip Babashka worker tests
        if: hashFiles('babashka_workers/bb.edn', 'babashka_workers/test/**/*.clj') == ''
        run: echo "No Babashka worker test setup found; skipping."
